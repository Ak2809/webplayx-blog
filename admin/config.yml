backend:
  name: git-gateway

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: 'content/page/home.md'
        label: 'Home'
        name: 'home'
        fields:
          - label: 'Title'
            name: 'title'
            widget: string
