backend:
  name: git-gateway
branch: main

# local_backend: true

# publish_mode: editorial_workflow

editor:
  preview: false

display_url: https://webplayx26.netlify.app/ # This url will display in the top-right of the CMS
media_folder: 'public/media' # Media files will be stored in the repo under static/media
public_folder: '/media' # The src attribute for uploaded media will begin with /media
collections:
  - name: 'page'
    label: 'Pages'
    files:
      - file: 'content/page/home.md'
        label: 'Home'
        name: 'home'
        fields:
          - label: 'Title'
            name: 'title'
            widget: string
